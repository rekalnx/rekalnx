<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #030407;
        stroke: #00f0ff;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.15));
      }
      
      .map-grid {
        stroke: #12182c;
        stroke-width: 1;
        fill: none;
        opacity: 0.35;
      }
      
      .laser-arc {
        fill: none;
        stroke-width: 1.5;
      }

      .log-box {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #ff0055;
        font-weight: bold;
      }
    </style>
  </defs>

  <!-- Box Container -->
  <rect width="900" height="250" rx="6" class="bg" />

  <!-- Grid Map -->
  <path d="M 0,50 L 900,50 M 0,100 L 900,100 M 0,150 L 900,150 M 0,200 L 900,200 
           M 100,0 L 100,250 M 200,0 L 200,250 M 300,0 L 300,250 M 400,0 L 400,250 
           M 500,0 L 500,250 M 600,0 L 600,250 M 700,0 L 700,250 M 800,0 L 800,250" class="map-grid" />

  <!-- Simplified Abstract World Map Nodes -->
  <circle cx="150" cy="90" r="4" fill="#ff0055">
    <animate attributeName="r" values="4;6.4;4" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <text x="150" y="80" font-family="Share Tech Mono" font-size="8" fill="#8f9bb3" text-anchor="middle">NODE_US_01</text>

  <circle cx="420" cy="80" r="4" fill="#ff0055">
    <animate attributeName="r" values="4;6.4;4" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <text x="420" y="70" font-family="Share Tech Mono" font-size="8" fill="#8f9bb3" text-anchor="middle">NODE_EU_02</text>

  <circle cx="680" cy="80" r="4" fill="#ff0055">
    <animate attributeName="r" values="4;6.4;4" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <text x="680" y="70" font-family="Share Tech Mono" font-size="8" fill="#8f9bb3" text-anchor="middle">NODE_ASIA_03</text>

  <!-- Indonesia / Target Core (Bogor) -->
  <circle cx="640" cy="180" r="6" fill="#00f0ff">
    <animate attributeName="r" values="6;9.6;6" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
  </circle>
  <text x="640" y="200" font-family="Share Tech Mono" font-size="9" fill="#00f0ff" text-anchor="middle" font-weight="bold">DEF_CENTER_ID</text>

  <!-- Rippling Impact Rings at ID (Native SVG Animation) -->
  <circle cx="640" cy="180" r="6" fill="none" stroke="#ff0055" stroke-width="1.5">
    <animate attributeName="r" values="6;40" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0" dur="3s" repeatCount="indefinite" />
    <animate attributeName="stroke" values="#ff0055;#bd00ff;#00f0ff" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="640" cy="180" r="6" fill="none" stroke="#ff0055" stroke-width="1.5">
    <animate attributeName="r" values="6;40" dur="3s" begin="1s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0" dur="3s" begin="1s" repeatCount="indefinite" />
    <animate attributeName="stroke" values="#ff0055;#bd00ff;#00f0ff" dur="3s" begin="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="640" cy="180" r="6" fill="none" stroke="#ff0055" stroke-width="1.5">
    <animate attributeName="r" values="6;40" dur="3s" begin="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0" dur="3s" begin="2s" repeatCount="indefinite" />
    <animate attributeName="stroke" values="#ff0055;#bd00ff;#00f0ff" dur="3s" begin="2s" repeatCount="indefinite" />
  </circle>

  <!-- Attack Laser Arcs -->
  <path d="M 150,90 Q 395,110 640,180" class="laser-arc" stroke="#ff0055" stroke-dasharray="250" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="250;0;-250" dur="4s" repeatCount="indefinite" begin="0s" />
    <animate attributeName="stroke" values="#ff0055;#bd00ff;#00f0ff" dur="4s" repeatCount="indefinite" begin="0s" />
  </path>
  <path d="M 420,80 Q 530,100 640,180" class="laser-arc" stroke="#ff0055" stroke-dasharray="250" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="250;0;-250" dur="4s" repeatCount="indefinite" begin="1.5s" />
    <animate attributeName="stroke" values="#ff0055;#bd00ff;#00f0ff" dur="4s" repeatCount="indefinite" begin="1.5s" />
  </path>
  <path d="M 680,80 Q 660,130 640,180" class="laser-arc" stroke="#ff0055" stroke-dasharray="250" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" values="250;0;-250" dur="4s" repeatCount="indefinite" begin="2.8s" />
    <animate attributeName="stroke" values="#ff0055;#bd00ff;#00f0ff" dur="4s" repeatCount="indefinite" begin="2.8s" />
  </path>

  <!-- Status / Log Overlays -->
  <g transform="translate(100, 215)">
    <rect width="320" height="22" rx="3" fill="#04050a" stroke="#ff0055" stroke-width="1" />
    <text x="15" y="15" class="log-box">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" />
      🔴 ALERT: GLOBAL INTRUSION MITIGATED // DEFENSE STATUS: ACTIVE
    </text>
  </g>

  <g transform="translate(480, 215)">
    <rect width="320" height="22" rx="3" fill="#04050a" stroke="#00f0ff" stroke-width="1" />
    <text x="15" y="15" class="log-box" style="fill: #00f0ff;">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" />
      🟢 SECURE: CORE_SYSTEMS LOCKED // PROTECTION: 100% OK
    </text>
  </g>

  <!-- Card Header overlay -->
  <rect width="900" height="30" fill="#04050a" opacity="0.85" />
  <text x="25" y="20" font-family="'Share Tech Mono', monospace" font-size="12" fill="#ff0055" font-weight="bold" letter-spacing="2">THREAT_INTEL_MAP_SIMULATION // GLOBAL_ATTACK_TELEMETRY</text>
  <line x1="0" y1="35" x2="900" y2="35" stroke="#00f0ff" stroke-width="1.5" />
</svg>
