<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #030407;
        stroke: #00f0ff;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 6px rgba(0, 240, 255, 0.1));
      }
      
      .map-grid {
        stroke: #12182c;
        stroke-width: 1;
        fill: none;
        opacity: 0.3;
      }
      
      .cyber-dot {
        fill: #00f0ff;
        animation: pulse-dot 2s infinite ease-in-out;
      }

      .threat-dot {
        fill: #ff0055;
        animation: pulse-dot 1.5s infinite ease-in-out;
      }

      @keyframes pulse-dot {
        0%, 100% { transform: scale(1); opacity: 0.4; }
        50% { transform: scale(1.8); opacity: 1; filter: drop-shadow(0 0 5px currentColor); }
      }
      
      .laser-arc {
        fill: none;
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: arc-draw 4s infinite linear;
      }

      @keyframes arc-draw {
        0% { stroke-dashoffset: 200; stroke: #ff0055; stroke-width: 1.5; }
        50% { stroke-dashoffset: 0; stroke: #bd00ff; stroke-width: 1.5; }
        100% { stroke-dashoffset: -200; stroke: #00f0ff; stroke-width: 1.5; opacity: 0; }
      }

      .log-box {
        font-family: 'Share Tech Mono', monospace;
        font-size: 10px;
        fill: #ff0055;
        font-weight: bold;
        animation: blink-log 1.5s infinite steps(2);
      }

      @keyframes blink-log {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Box Container -->
  <rect width="440" height="250" rx="5" class="bg" />

  <!-- Grid Map -->
  <path d="M 0,50 L 440,50 M 0,100 L 440,100 M 0,150 L 440,150 M 0,200 L 440,200 
           M 50,0 L 50,250 M 100,0 L 100,250 M 150,0 L 150,250 M 200,0 L 200,250 
           M 250,0 L 250,250 M 300,0 L 300,250 M 350,0 L 350,250 M 400,0 L 400,250" class="map-grid" />

  <!-- Simplified Abstract World Map Nodes -->
  <!-- US -->
  <circle cx="80" cy="90" r="4" class="threat-dot" style="transform-origin: 80px 90px;" />
  <text x="80" y="80" font-family="Share Tech Mono" font-size="8" fill="#8f9bb3" text-anchor="middle">NODE_US_01</text>

  <!-- Europe -->
  <circle cx="210" cy="80" r="4" class="threat-dot" style="transform-origin: 210px 80px;" />
  <text x="210" y="70" font-family="Share Tech Mono" font-size="8" fill="#8f9bb3" text-anchor="middle">NODE_EU_02</text>

  <!-- Indonesia / Target Core (Bogor) -->
  <circle cx="340" cy="180" r="6" class="cyber-dot" style="transform-origin: 340px 180px;" />
  <text x="340" y="200" font-family="Share Tech Mono" font-size="9" fill="#00f0ff" text-anchor="middle" font-weight="bold">DEF_CENTER_ID</text>

  <!-- Attack Laser Arcs -->
  <!-- US to ID -->
  <path d="M 80,90 Q 210,100 340,180" class="laser-arc" />
  
  <!-- EU to ID -->
  <path d="M 210,80 Q 275,100 340,180" class="laser-arc" style="animation-delay: 1.5s;" />

  <!-- Status / Log Overlays -->
  <g transform="translate(20, 215)">
    <rect width="180" height="22" rx="3" fill="#04050a" stroke="#ff0055" stroke-width="1" />
    <text x="10" y="14" class="log-box">🔴 ALERT: INTRUSION BLOCKED</text>
  </g>

  <g transform="translate(230, 215)">
    <rect width="190" height="22" rx="3" fill="#04050a" stroke="#00f0ff" stroke-width="1" />
    <text x="10" y="14" class="log-box" style="fill: #00f0ff; animation-duration: 2.5s;">🟢 SECURE: SHIELD ACTIVE (100%)</text>
  </g>

  <!-- Card Header overlay -->
  <rect width="440" height="30" fill="#04050a" opacity="0.85" />
  <text x="20" y="20" font-family="'Share Tech Mono', monospace" font-size="11" fill="#ff0055" font-weight="bold" letter-spacing="1">THREAT_INTEL_MAP_SIMULATION</text>
  <line x1="0" y1="30" x2="440" y2="30" stroke="#00f0ff" stroke-width="1" />
</svg>
