<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #030407;
        stroke: #ff0055;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 8px rgba(255, 0, 85, 0.15));
      }

      .telemetry-txt {
        font-family: 'Share Tech Mono', monospace;
        font-size: 12px;
        fill: #00f0ff;
        letter-spacing: 1px;
      }

      .glowing-red {
        stroke: #ff0055;
        filter: drop-shadow(0 0 5px #ff0055);
      }

      .glowing-cyan {
        stroke: #00f0ff;
        filter: drop-shadow(0 0 5px #00f0ff);
      }

      .scope-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #ff0055;
        font-weight: bold;
        letter-spacing: 2px;
        animation: blink-tag 1s infinite alternate;
      }

      @keyframes blink-tag {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      /* Sine Wave Oscillation */
      .wave-line {
        stroke: #bd00ff;
        stroke-width: 1.5;
        fill: none;
        opacity: 0.6;
        animation: shift-wave 3s infinite linear;
      }

      @keyframes shift-wave {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -120; }
      }
    </style>
  </defs>

  <!-- Box Container -->
  <rect width="900" height="250" rx="6" class="bg" />

  <!-- Oscilloscope Grid Background (Centered) -->
  <circle cx="450" cy="140" r="85" fill="none" stroke="#12182c" stroke-width="0.75" />
  <circle cx="450" cy="140" r="55" fill="none" stroke="#12182c" stroke-width="0.75" />
  <line x1="450" y1="35" x2="450" y2="245" stroke="#12182c" stroke-dasharray="3, 3" stroke-width="1" />
  <line x1="300" y1="140" x2="600" y2="140" stroke="#12182c" stroke-dasharray="3, 3" stroke-width="1" />

  <!-- Scope HUD (Rotated and Pulsed) -->
  <g transform="translate(450, 140)">
    <!-- Rotating Ring -->
    <circle r="70" fill="none" stroke="#ff0055" stroke-dasharray="20, 10, 5, 10" stroke-width="1.5" class="glowing-red">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </circle>
    
    <!-- Outer Target Ring -->
    <circle r="85" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="40, 60" class="glowing-cyan">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite" />
    </circle>

    <!-- Inner Reticle -->
    <polygon points="0,-12 10,0 0,12 -10,0" fill="none" stroke="#ff0055" stroke-width="2" class="glowing-red">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" />
    </polygon>

    <!-- Lock Label -->
    <text x="0" y="-95" text-anchor="middle" class="scope-label">LOCK_ON: VULN_NODE_0x93A</text>
  </g>

  <!-- Oscilloscope Sine Wave at Bottom -->
  <path d="M 10,215 Q 30,200 50,215 T 90,215 T 130,215 T 170,215 T 210,215 T 250,215 T 290,215 T 330,215 T 370,215 T 410,215 T 450,215 T 490,215 T 530,215 T 570,215 T 610,215 T 650,215 T 690,215 T 730,215 T 770,215 T 810,215 T 850,215 T 890,215" 
        class="wave-line" stroke-dasharray="10, 10" />

  <!-- Telemetry Text Data Blocks -->
  <!-- Left Block -->
  <g transform="translate(40, 65)">
    <text y="15" class="telemetry-txt">SYS_STAT: MONITORING</text>
    <text y="35" class="telemetry-txt">SEC_PORT: 1337_ACTIVE</text>
    <text y="55" class="telemetry-txt">RECON_ID: rekalnx (OK)</text>
    <text y="75" class="telemetry-txt">IPS_CTRL: FIREWALL_ON</text>
    <text y="95" class="telemetry-txt">ACTIVE_MITIGATIONS: 42</text>
  </g>

  <!-- Right Block -->
  <g transform="translate(680, 65)">
    <text y="15" class="telemetry-txt">HEX_COORD: 0xDEADBEEF</text>
    <text y="35" class="telemetry-txt">SIG_LEVEL: 4.82 (45th)</text>
    <text y="55" class="telemetry-txt">REP_VALUE: 305 (HIGH)</text>
    <text y="75" class="telemetry-txt">IMP_VALUE: 28.33 (92nd)</text>
    <text y="95" class="telemetry-txt">CYBER_SHIELD: 100% OK</text>
  </g>

  <!-- Card Header overlay -->
  <rect width="900" height="30" fill="#04050a" opacity="0.85" />
  <text x="25" y="20" font-family="'Share Tech Mono', monospace" font-size="12" fill="#ff0055" font-weight="bold" letter-spacing="2">TELEMETRY_TARGETING_HUD // COUNTER_SYSTEMS_MONITOR</text>
  <line x1="0" y1="35" x2="900" y2="35" stroke="#00f0ff" stroke-width="1.5" />
</svg>
