<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #030407;
        stroke: #ff0055;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 6px rgba(255, 0, 85, 0.1));
      }

      .telemetry-txt {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #00f0ff;
        letter-spacing: 1px;
      }

      .glowing-red {
        stroke: #ff0055;
        filter: drop-shadow(0 0 4px #ff0055);
      }

      .glowing-cyan {
        stroke: #00f0ff;
        filter: drop-shadow(0 0 4px #00f0ff);
      }

      .scope-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 10px;
        fill: #ff0055;
        font-weight: bold;
        letter-spacing: 1.5px;
        animation: blink-tag 1s infinite alternate;
      }

      @keyframes blink-tag {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }

      /* Sine Wave Oscillation */
      .wave-line {
        stroke: #bd00ff;
        stroke-width: 1.5;
        fill: none;
        opacity: 0.6;
        animation: shift-wave 3s infinite linear;
      }

      @keyframes shift-wave {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -120; }
      }
    </style>
  </defs>

  <!-- Box Container -->
  <rect width="440" height="250" rx="5" class="bg" />

  <!-- Oscilloscope Grid Background -->
  <circle cx="220" cy="140" r="85" fill="none" stroke="#12182c" stroke-width="0.75" />
  <circle cx="220" cy="140" r="55" fill="none" stroke="#12182c" stroke-width="0.75" />
  <line x1="220" y1="35" x2="220" y2="245" stroke="#12182c" stroke-dasharray="3, 3" stroke-width="1" />
  <line x1="110" y1="140" x2="330" y2="140" stroke="#12182c" stroke-dasharray="3, 3" stroke-width="1" />

  <!-- Scope HUD (Rotated and Pulsed) -->
  <g transform="translate(220, 140)">
    <!-- Rotating Ring -->
    <circle r="70" fill="none" stroke="#ff0055" stroke-dasharray="20, 10, 5, 10" stroke-width="1.5" class="glowing-red">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </circle>
    
    <!-- Outer Target Ring -->
    <circle r="85" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="40, 60" class="glowing-cyan">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite" />
    </circle>

    <!-- Inner Reticle -->
    <polygon points="0,-12 10,0 0,12 -10,0" fill="none" stroke="#ff0055" stroke-width="2" class="glowing-red">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" />
    </polygon>

    <!-- Lock Label -->
    <text x="0" y="-95" text-anchor="middle" class="scope-label">LOCK_ON: VULN_NODE_0x93A</text>
  </g>

  <!-- Oscilloscope Sine Wave at Bottom -->
  <path d="M 10,210 Q 30,195 50,210 T 90,210 T 130,210 T 170,210 T 210,210 T 250,210 T 290,210 T 330,210 T 370,210 T 410,210 T 430,210" 
        class="wave-line" stroke-dasharray="10, 10" />

  <!-- Telemetry Text Data Blocks -->
  <!-- Left Block -->
  <g transform="translate(20, 55)">
    <text y="15" class="telemetry-txt">SYS_STAT: RUNNING</text>
    <text y="35" class="telemetry-txt">SEC_PORT: 1337</text>
    <text y="55" class="telemetry-txt">RECON_ID: rekalnx</text>
    <text y="75" class="telemetry-txt">IPS_CTRL: FIREWALL</text>
  </g>

  <!-- Right Block -->
  <g transform="translate(310, 55)">
    <text y="15" class="telemetry-txt">HEX: 0xDEADBEEF</text>
    <text y="35" class="telemetry-txt">SIG: 4.82 (OK)</text>
    <text y="55" class="telemetry-txt">REP: 305 (HI)</text>
    <text y="75" class="telemetry-txt">IMP: 28.33 (TOP)</text>
  </g>

  <!-- Card Header overlay -->
  <rect width="440" height="30" fill="#04050a" opacity="0.85" />
  <text x="20" y="20" font-family="'Share Tech Mono', monospace" font-size="11" fill="#ff0055" font-weight="bold" letter-spacing="1">TELEMETRY_TARGETING_HUD</text>
  <line x1="0" y1="30" x2="440" y2="30" stroke="#00f0ff" stroke-width="1" />
</svg>
