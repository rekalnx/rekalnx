<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #030407;
        stroke: #bd00ff;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 8px rgba(189, 0, 255, 0.2));
      }
      
      .code-stream {
        font-family: 'Share Tech Mono', monospace;
        letter-spacing: 1.5px;
        writing-mode: vertical-rl;
        text-orientation: upright;
      }

      /* Depth Layers */
      .bg-layer {
        font-size: 8.5px;
        opacity: 0.25;
        filter: blur(0.5px);
      }

      .mid-layer {
        font-size: 11.5px;
        opacity: 0.65;
      }

      .fg-layer {
        font-size: 14px;
        opacity: 0.95;
        font-weight: bold;
      }

      /* Glowing Colors */
      .cyan-code {
        fill: #00f0ff;
        text-shadow: 0 0 4px #00f0ff, 0 0 8px #00f0ff;
      }

      .purple-code {
        fill: #bd00ff;
        text-shadow: 0 0 4px #bd00ff, 0 0 8px #bd00ff;
      }

      .head-char {
        fill: #ffffff !important;
        text-shadow: 0 0 6px #ffffff, 0 0 12px #00f0ff !important;
        font-weight: bold;
      }
      
      /* Rain animations */
      .rain-col {
        animation: fall 8s linear infinite;
      }
      
      @keyframes fall {
        0% { transform: translateY(-260px); }
        100% { transform: translateY(260px); }
      }
      
      /* Speeds based on depth */
      .speed-slow { animation-duration: 11s; }
      .speed-mid { animation-duration: 7.5s; }
      .speed-fast { animation-duration: 4.8s; }

      .delay-1 { animation-delay: 0.5s; }
      .delay-2 { animation-delay: 2.2s; }
      .delay-3 { animation-delay: 1.1s; }
      .delay-4 { animation-delay: 3.5s; }
      .delay-5 { animation-delay: 0s; }
      .delay-6 { animation-delay: 4.8s; }
      .delay-7 { animation-delay: 1.8s; }
      .delay-8 { animation-delay: 5.5s; }
      .delay-9 { animation-delay: 3.0s; }
      .delay-10 { animation-delay: 0.8s; }
    </style>
  </defs>

  <!-- Box Container -->
  <rect width="900" height="250" rx="6" class="bg" />

  <!-- BACKGROUND LAYER (Slow, small, blurred) -->
  <g class="rain-col speed-slow delay-3" transform="translate(70, 10)"><text class="code-stream bg-layer purple-code">importosSysSocket</text></g>
  <g class="rain-col speed-slow delay-8" transform="translate(190, 10)"><text class="code-stream bg-layer cyan-code">msg.sender.call</text></g>
  <g class="rain-col speed-slow delay-2" transform="translate(310, 10)"><text class="code-stream bg-layer purple-code">assertBalanceOwner</text></g>
  <g class="rain-col speed-slow delay-6" transform="translate(430, 10)"><text class="code-stream bg-layer cyan-code">solidityDeFiSmart</text></g>
  <g class="rain-col speed-slow delay-9" transform="translate(550, 10)"><text class="code-stream bg-layer purple-code">attackerBlockedTarget</text></g>
  <g class="rain-col speed-slow delay-4" transform="translate(670, 10)"><text class="code-stream bg-layer cyan-code">functionSafeTransfer</text></g>
  <g class="rain-col speed-slow delay-7" transform="translate(790, 10)"><text class="code-stream bg-layer purple-code">bugBountyHunterHacker</text></g>

  <!-- MIDGROUND LAYER (Standard) -->
  <g class="rain-col speed-mid delay-5" transform="translate(30, 10)"><text class="code-stream mid-layer cyan-code"><tspan class="head-char">C</tspan>ontractSolidityAuditRequireMsgSenderBalanceOwner0x</text></g>
  <g class="rain-col speed-mid delay-1" transform="translate(150, 10)"><text class="code-stream mid-layer purple-code"><tspan class="head-char">R</tspan>eentrancyAttackExploitTransferPayloadSendCallGas</text></g>
  <g class="rain-col speed-mid delay-6" transform="translate(270, 10)"><text class="code-stream mid-layer cyan-code"><tspan class="head-char">D</tspan>efCheckVulnerabilityPayloadAuditResponseHeader</text></g>
  <g class="rain-col speed-mid delay-4" transform="translate(390, 10)"><text class="code-stream mid-layer purple-code"><tspan class="head-char">M</tspan>odifyOnlyOwnerSelfdestructKillContractSecureAudit</text></g>
  <g class="rain-col speed-mid delay-8" transform="translate(510, 10)"><text class="code-stream mid-layer cyan-code"><tspan class="head-char">0</tspan>x3e002827240996cd07fd2c14d9b6044e87eb0be169aeb</text></g>
  <g class="rain-col speed-mid delay-10" transform="translate(630, 10)"><text class="code-stream mid-layer purple-code"><tspan class="head-char">N</tspan>ASA_LoR_ApprovedVDPRecipientHackerOneRankExpert</text></g>
  <g class="rain-col speed-mid delay-3" transform="translate(750, 10)"><text class="code-stream mid-layer cyan-code"><tspan class="head-char">E</tspan>xploitMitigatedDefenseSecureCyberShieldActive1337</text></g>
  <g class="rain-col speed-mid delay-7" transform="translate(870, 10)"><text class="code-stream mid-layer purple-code"><tspan class="head-char">S</tspan>olvProtocolAuditedSmartContractsSecurityLocked</text></g>

  <!-- FOREGROUND LAYER (Fast, large, glowing) -->
  <g class="rain-col speed-fast delay-2" transform="translate(110, 10)"><text class="code-stream fg-layer cyan-code"><tspan class="head-char">X</tspan>SS_BYPASS_AUTH</text></g>
  <g class="rain-col speed-fast delay-7" transform="translate(230, 10)"><text class="code-stream fg-layer purple-code"><tspan class="head-char">P</tspan>ORT_SCAN_RECON</text></g>
  <g class="rain-col speed-fast delay-9" transform="translate(350, 10)"><text class="code-stream fg-layer cyan-code"><tspan class="head-char">S</tspan>OLIDITY_EXPERT</text></g>
  <g class="rain-col speed-fast delay-1" transform="translate(470, 10)"><text class="code-stream fg-layer purple-code"><tspan class="head-char">K</tspan>ILL_EXPLOITER</text></g>
  <g class="rain-col speed-fast delay-4" transform="translate(590, 10)"><text class="code-stream fg-layer cyan-code"><tspan class="head-char">N</tspan>UCLEI_SCAN_ON</text></g>
  <g class="rain-col speed-fast delay-10" transform="translate(710, 10)"><text class="code-stream fg-layer purple-code"><tspan class="head-char">B</tspan>ILT_SECURE_OK</text></g>
  <g class="rain-col speed-fast delay-6" transform="translate(830, 10)"><text class="code-stream fg-layer cyan-code"><tspan class="head-char">0</tspan>xDEADBEEF_KEY</text></g>

  <!-- Card Header overlay -->
  <rect width="900" height="30" fill="#04050a" opacity="0.85" />
  <text x="25" y="20" font-family="'Share Tech Mono', monospace" font-size="12" fill="#00f0ff" font-weight="bold" letter-spacing="2">LIVE_CODE_AUDIT_STREAMS // 3D_MATRIX_DEPTH_STREAM</text>
  <line x1="0" y1="35" x2="900" y2="35" stroke="#bd00ff" stroke-width="1.5" />
</svg>
