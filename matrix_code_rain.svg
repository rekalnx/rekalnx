<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #030407;
        stroke: #bd00ff;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 8px rgba(189, 0, 255, 0.15));
      }
      
      .code-stream {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        letter-spacing: 1px;
        writing-mode: vertical-rl;
        text-orientation: upright;
      }

      .cyan-code {
        fill: #00f0ff;
        text-shadow: 0 0 4px #00f0ff, 0 0 8px #00f0ff;
      }

      .purple-code {
        fill: #bd00ff;
        text-shadow: 0 0 4px #bd00ff, 0 0 8px #bd00ff;
      }
      
      /* Rain animation */
      .rain-col {
        animation: fall 8s linear infinite;
      }
      
      @keyframes fall {
        0% { transform: translateY(-250px); }
        100% { transform: translateY(250px); }
      }
      
      .delay-1 { animation-delay: 0.5s; animation-duration: 6s; }
      .delay-2 { animation-delay: 2.2s; animation-duration: 9s; }
      .delay-3 { animation-delay: 1.1s; animation-duration: 7s; }
      .delay-4 { animation-delay: 3.5s; animation-duration: 10s; }
      .delay-5 { animation-delay: 0s; animation-duration: 8s; }
      .delay-6 { animation-delay: 4.8s; animation-duration: 7.5s; }
      .delay-7 { animation-delay: 1.8s; animation-duration: 6.5s; }
      .delay-8 { animation-delay: 5.5s; animation-duration: 8.5s; }
      .delay-9 { animation-delay: 3.0s; animation-duration: 7.2s; }
      .delay-10 { animation-delay: 0.8s; animation-duration: 9.5s; }
    </style>
  </defs>

  <!-- Box Container -->
  <rect width="900" height="250" rx="6" class="bg" />

  <!-- Code Streams across 900px -->
  <g class="rain-col delay-5" transform="translate(40, 10)"><text class="code-stream cyan-code">contractSolidityAuditRequireMsgSenderBalanceOwner0x</text></g>
  <g class="rain-col delay-1" transform="translate(100, 10)"><text class="code-stream purple-code">importosSysSocketRequestSubfinderFindomainNuclei</text></g>
  <g class="rain-col delay-3" transform="translate(160, 10)"><text class="code-stream cyan-code">reentrancyAttackExploitTransferPayloadSendCallGas</text></g>
  <g class="rain-col delay-6" transform="translate(220, 10)"><text class="code-stream purple-code">defCheckVulnerabilityPayloadAuditResponseHeader</text></g>
  <g class="rain-col delay-2" transform="translate(280, 10)"><text class="code-stream cyan-code">assertBalanceOwnerModifyOnlyOwnerSelfdestructKill</text></g>
  <g class="rain-col delay-7" transform="translate(340, 10)"><text class="code-stream purple-code">openPortScanReconTargetLockedBypassAuthAdminNmap</text></g>
  <g class="rain-col delay-4" transform="translate(400, 10)"><text class="code-stream cyan-code">0x3e002827240996cd07fd2c14d9b6044e87eb0be169aeb</text></g>
  <g class="rain-col delay-8" transform="translate(460, 10)"><text class="code-stream purple-code">solidityDeFiSmartContractAuditingVulnerability</text></g>
  <g class="rain-col delay-9" transform="translate(520, 10)"><text class="code-stream cyan-code">retestBountyEarnedM&amp;TBankVDPNASA_LoR_Approved</text></g>
  <g class="rain-col delay-10" transform="translate(580, 10)"><text class="code-stream purple-code">exploitMitigatedDefenseSecureCyberShieldActive</text></g>
  <g class="rain-col delay-1" transform="translate(640, 10)"><text class="code-stream cyan-code">attackerBlockedTargetLockedAuthBypassedPort1337</text></g>
  <g class="rain-col delay-3" transform="translate(700, 10)"><text class="code-stream purple-code">functionSafeTransferFromAddressToUintValueOwner</text></g>
  <g class="rain-col delay-7" transform="translate(760, 10)"><text class="code-stream cyan-code">bugBountyHunterHackerOneHackenProofBugcrowdRank</text></g>
  <g class="rain-col delay-5" transform="translate(820, 10)"><text class="code-stream purple-code">valentinoreihanreivalentinovalentinokeseluruhan</text></g>

  <!-- Card Header overlay -->
  <rect width="900" height="30" fill="#04050a" opacity="0.85" />
  <text x="25" y="20" font-family="'Share Tech Mono', monospace" font-size="12" fill="#00f0ff" font-weight="bold" letter-spacing="2">LIVE_CODE_AUDIT_STREAMS // DATA_STREAM_RECEIVER</text>
  <line x1="0" y1="35" x2="900" y2="35" stroke="#bd00ff" stroke-width="1.5" />
</svg>
