<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #030407;
        stroke: #bd00ff;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 6px rgba(189, 0, 255, 0.1));
      }
      
      .code-stream {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        letter-spacing: 1px;
        writing-mode: vertical-rl;
        text-orientation: upright;
      }

      .cyan-code {
        fill: #00f0ff;
        text-shadow: 0 0 4px #00f0ff, 0 0 8px #00f0ff;
      }

      .purple-code {
        fill: #bd00ff;
        text-shadow: 0 0 4px #bd00ff, 0 0 8px #bd00ff;
      }
      
      /* Rain animation */
      .rain-col {
        animation: fall 8s linear infinite;
      }
      
      @keyframes fall {
        0% {
          transform: translateY(-250px);
        }
        100% {
          transform: translateY(250px);
        }
      }
      
      .delay-1 { animation-delay: 0.5s; animation-duration: 6s; }
      .delay-2 { animation-delay: 2.2s; animation-duration: 9s; }
      .delay-3 { animation-delay: 1.1s; animation-duration: 7s; }
      .delay-4 { animation-delay: 3.5s; animation-duration: 10s; }
      .delay-5 { animation-delay: 0s; animation-duration: 8s; }
      .delay-6 { animation-delay: 4.8s; animation-duration: 7.5s; }
      .delay-7 { animation-delay: 1.8s; animation-duration: 6.5s; }
    </style>
  </defs>

  <!-- Box Container -->
  <rect width="440" height="250" rx="5" class="bg" />

  <!-- Code Streams -->
  <!-- Col 1 -->
  <g class="rain-col delay-5" transform="translate(30, 10)">
    <text class="code-stream cyan-code">contractSolidityAuditRequireMsgSenderBalanceOwner0x</text>
  </g>
  
  <!-- Col 2 -->
  <g class="rain-col delay-1" transform="translate(90, 10)">
    <text class="code-stream purple-code">importosSysSocketRequestSubfinderFindomainNuclei</text>
  </g>

  <!-- Col 3 -->
  <g class="rain-col delay-3" transform="translate(150, 10)">
    <text class="code-stream cyan-code">reentrancyAttackExploitTransferPayloadSendCallGas</text>
  </g>

  <!-- Col 4 -->
  <g class="rain-col delay-6" transform="translate(210, 10)">
    <text class="code-stream purple-code">defCheckVulnerabilityPayloadAuditResponseHeader</text>
  </g>

  <!-- Col 5 -->
  <g class="rain-col delay-2" transform="translate(270, 10)">
    <text class="code-stream cyan-code">assertBalanceOwnerModifyOnlyOwnerSelfdestructKill</text>
  </g>

  <!-- Col 6 -->
  <g class="rain-col delay-7" transform="translate(330, 10)">
    <text class="code-stream purple-code">openPortScanReconTargetLockedBypassAuthAdminNmap</text>
  </g>

  <!-- Col 7 -->
  <g class="rain-col delay-4" transform="translate(390, 10)">
    <text class="code-stream cyan-code">0x3e002827240996cd07fd2c14d9b6044e87eb0be169aeb</text>
  </g>
  
  <!-- Card Header overlay -->
  <rect width="440" height="30" fill="#04050a" opacity="0.85" />
  <text x="20" y="20" font-family="'Share Tech Mono', monospace" font-size="11" fill="#00f0ff" font-weight="bold" letter-spacing="1">LIVE_CODE_AUDIT_STREAMS</text>
  <line x1="0" y1="30" x2="440" y2="30" stroke="#bd00ff" stroke-width="1" />
</svg>
