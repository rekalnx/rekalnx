<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="100%" height="100%">
  <defs>
    <!-- CSS styles for simulated terminal typing animations -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;display=swap');
      
      .terminal {
        fill: #04050a;
        stroke: #ff0055;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 12px rgba(255, 0, 85, 0.15));
      }
      
      .window-header {
        fill: #0c0d17;
        stroke: #ff0055;
        stroke-width: 1.5;
      }
      
      .text-base {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 13.5px;
        fill: #ffffff;
      }
      
      .prompt {
        fill: #00f0ff;
        font-weight: bold;
      }
      
      .command {
        fill: #ffffff;
      }
      
      .log-success {
        fill: #00ff66;
        text-shadow: 0 0 4px #00ff66;
      }
      
      .log-warn {
        fill: #ffaa00;
        text-shadow: 0 0 4px #ffaa00;
      }
      
      .log-danger {
        fill: #ff0055;
        text-shadow: 0 0 6px #ff0055;
        font-weight: bold;
      }

      .cursor {
        fill: #00f0ff;
        animation: blink 1s step-end infinite;
      }
      
      @keyframes blink {
        from, to { opacity: 0; }
        50% { opacity: 1; }
      }

      /* Line Sequential Appearances */
      .line {
        opacity: 0;
      }

      .type-1 { animation: type 0.4s ease-out 0.5s forwards; }
      .type-2 { animation: type 0.3s ease-out 2.6s forwards; }
      .type-3 { animation: type 0.3s ease-out 3.8s forwards; }
      .type-4 { animation: type-blink 0.3s ease-out 5.2s forwards; }
      .type-5 { animation: type 0.3s ease-out 7.0s forwards; }
      .type-6 { animation: type 0.3s ease-out 8.2s forwards; }
      
      @keyframes type {
        to { opacity: 1; }
      }
      
      @keyframes type-blink {
        0% { opacity: 0; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
      }

      /* Text Masking to simulate typing character by character */
      .mask-cmd {
        stroke: none;
        fill: #04050a;
        animation: type-cmd 1.8s steps(32) 0.8s forwards;
      }

      @keyframes type-cmd {
        to { transform: translateX(380px); }
      }
    </style>
  </defs>

  <!-- Terminal Window Body -->
  <rect width="900" height="250" rx="8" class="terminal" />
  
  <!-- Window Header -->
  <rect width="900" height="30" rx="8" class="window-header" />
  
  <!-- Window Control Buttons -->
  <circle cx="18" cy="15" r="6" fill="#ff5f56" />
  <circle cx="38" cy="15" r="6" fill="#ffbd2e" />
  <circle cx="58" cy="15" r="6" fill="#27c93f" />
  
  <!-- Window Title -->
  <text x="450" y="20" text-anchor="middle" font-family="'Fira Code', monospace" font-size="11.5" fill="#8f9bb3">rekalnx@sec-core: ~/exploits</text>
  
  <!-- Terminal Content Lines -->
  <!-- Line 1: Command Prompt & Command Input -->
  <g class="line type-1" transform="translate(20, 60)">
    <text class="text-base"><tspan class="prompt">rekalnx@sec-core:~$</tspan> <tspan class="command">./exploiter-killer.sh --target solv-protocol</tspan></text>
    <!-- Typing animation mask -->
    <rect x="165" y="-14" width="380" height="20" class="mask-cmd" />
  </g>
  
  <!-- Line 2: Initializing -->
  <g class="line type-2" transform="translate(20, 90)">
    <text class="text-base log-success">[+] Initializing Advanced Vulnerability Mitigation Engine...</text>
  </g>
  
  <!-- Line 3: Auditing -->
  <g class="line type-3" transform="translate(20, 120)">
    <text class="text-base">[i] Target Address: 0x9320d... -- Auditing Solidity Smart Contracts...</text>
  </g>
  
  <!-- Line 4: Alert Vulnerability Detected -->
  <g class="line type-4" transform="translate(20, 150)">
    <text class="text-base log-danger">[!] ALERT: Critical Vulnerability Found! CWE-306 (Missing Authentication in core transfer)</text>
  </g>
  
  <!-- Line 5: Mitigation -->
  <g class="line type-5" transform="translate(20, 180)">
    <text class="text-base log-success">[+] Executing Countermeasures... Exploit neutralized. Security Shield: ONLINE.</text>
  </g>
  
  <!-- Line 6: Next prompt -->
  <g class="line type-6" transform="translate(20, 210)">
    <text class="text-base"><tspan class="prompt">rekalnx@sec-core:~$</tspan></text>
    <rect x="165" y="-12" width="8" height="15" class="cursor" />
  </g>
</svg>
