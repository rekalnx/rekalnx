<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;display=swap');
      
      .terminal {
        fill: #04050a;
        stroke: #ff0055;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 12px rgba(255, 0, 85, 0.2));
      }
      
      .window-header {
        fill: #0c0d17;
        stroke: #ff0055;
        stroke-width: 1.5;
      }
      
      .text-base {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 13.5px;
        fill: #ffffff;
      }
      
      .prompt {
        fill: #00f0ff;
        font-weight: bold;
      }
      
      .command {
        fill: #ffffff;
      }
      
      .log-success {
        fill: #00ff66;
        text-shadow: 0 0 4px #00ff66;
      }
      
      .log-warn {
        fill: #ffaa00;
        text-shadow: 0 0 4px #ffaa00;
      }
      
      .log-danger {
        fill: #ff0055;
        text-shadow: 0 0 6px #ff0055;
        font-weight: bold;
      }

      .scanlines {
        fill: url(#scanlinePattern);
        opacity: 0.08;
      }
    </style>

    <!-- Scanline Pattern -->
    <pattern id="scanlinePattern" width="100" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100" y2="0" stroke="#000000" stroke-width="1.5" />
    </pattern>
  </defs>

  <!-- Terminal Window Body -->
  <rect width="900" height="250" rx="8" class="terminal" />
  
  <!-- Window Header -->
  <rect width="900" height="30" rx="8" class="window-header" />
  
  <!-- Window Control Buttons -->
  <circle cx="18" cy="15" r="6" fill="#ff5f56" />
  <circle cx="38" cy="15" r="6" fill="#ffbd2e" />
  <circle cx="58" cy="15" r="6" fill="#27c93f" />
  
  <!-- Window Title -->
  <text x="450" y="20" text-anchor="middle" font-family="'Fira Code', monospace" font-size="11.5" fill="#8f9bb3">rekalnx@sec-core: ~/exploits</text>
  
  <!-- CRT Scanlines -->
  <rect width="900" height="250" class="scanlines" rx="8" pointer-events="none" />

  <!-- Terminal Content Lines -->
  <!-- Line 1: Command Prompt & Command Input (Visible at 0.5s) -->
  <g transform="translate(20, 60)">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.5;1" dur="1s" begin="0s" fill="freeze" />
    <text class="text-base"><tspan class="prompt">rekalnx@sec-core:~$</tspan> <tspan class="command">./exploiter-killer.sh --target target.xyz</tspan></text>
    <!-- Typing animation mask (Starts uncovering at 0.8s, finished at 2.6s) -->
    <rect x="165" y="-14" width="0" height="20" fill="#04050a">
      <animate attributeName="width" values="380;380;0" keyTimes="0;0.3;1" dur="2.6s" begin="0s" fill="freeze" />
    </rect>
  </g>
  
  <!-- Line 2: Initializing (Visible at 2.6s) -->
  <g transform="translate(20, 90)">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.86;1" dur="3s" begin="0s" fill="freeze" />
    <text class="text-base log-success">[+] Initializing Advanced Vulnerability Mitigation Engine...</text>
  </g>
  
  <!-- Line 3: Auditing (Visible at 3.8s) -->
  <g transform="translate(20, 120)">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.95;1" dur="4s" begin="0s" fill="freeze" />
    <text class="text-base">[i] Target Address: 0x9320d... -- Auditing Solidity Smart Contracts...</text>
  </g>
  
  <!-- Line 4: Alert Vulnerability Detected (Visible at 5.2s) -->
  <g transform="translate(20, 150)">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.94;1" dur="5.5s" begin="0s" fill="freeze" />
    <!-- Blinking alert border -->
    <rect x="-5" y="-14" width="850" height="20" fill="none" stroke="#ff0055" stroke-width="1" stroke-dasharray="4">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    </rect>
    <text class="text-base log-danger">[!] ALERT: Critical Vulnerability Found! CWE-306 (Missing Authentication in core transfer)</text>
  </g>
  
  <!-- Line 5: Mitigation (Visible at 7.0s) -->
  <g transform="translate(20, 180)">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.97;1" dur="7.2s" begin="0s" fill="freeze" />
    <text class="text-base log-success">[+] Executing Countermeasures... Exploit neutralized. Security Shield: ONLINE.</text>
  </g>
  
  <!-- Line 6: Next prompt (Visible at 8.2s) -->
  <g transform="translate(20, 210)">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.96;1" dur="8.5s" begin="0s" fill="freeze" />
    <text class="text-base"><tspan class="prompt">rekalnx@sec-core:~$</tspan></text>
    <!-- Blinking cursor -->
    <rect x="165" y="-12" width="8" height="15" fill="#00f0ff">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
