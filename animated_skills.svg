<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #04050a;
        stroke: #00f0ff;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.15));
      }

      .badge-bg {
        fill: #0c0d18;
        stroke: #bd00ff;
        stroke-width: 1;
        transition: all 0.3s ease;
      }

      .badge-bg:hover {
        stroke: #00f0ff;
        fill: #16192d;
        filter: drop-shadow(0 0 6px #00f0ff);
      }

      .badge-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #ffffff;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .scanner-beam {
        stroke: rgba(0, 240, 255, 0.4);
        stroke-width: 1.5;
        filter: drop-shadow(0 0 3px #00f0ff);
        animation: badge-scan 3s infinite ease-in-out;
      }

      @keyframes badge-scan {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(110px); }
      }

      .purple-badge {
        stroke: #bd00ff;
      }

      .cyan-badge {
        stroke: #00f0ff;
      }

      .red-badge {
        stroke: #ff0055;
      }
    </style>
  </defs>

  <!-- Box Container -->
  <rect width="900" height="120" rx="6" class="bg" />

  <!-- Title -->
  <text x="25" y="25" font-family="'Share Tech Mono', monospace" font-size="12" fill="#00f0ff" font-weight="bold" letter-spacing="2">CORE_TECHNICAL_SKILLS // HUD_SKILLS_GRID</text>
  <line x1="0" y1="35" x2="900" y2="35" stroke="#bd00ff" stroke-width="1.5" />

  <!-- Badge 1: Smart Contracts -->
  <g transform="translate(25, 48)">
    <rect width="150" height="26" rx="13" class="badge-bg red-badge" />
    <text x="75" y="17" text-anchor="middle" class="badge-text">🛡️ SMART CONTRACTS</text>
  </g>

  <!-- Badge 2: Solidity Audit -->
  <g transform="translate(190, 48)">
    <rect width="130" height="26" rx="13" class="badge-bg red-badge" />
    <text x="65" y="17" text-anchor="middle" class="badge-text">⛓️ SOLIDITY AUDITING</text>
  </g>

  <!-- Badge 3: Web Pentesting -->
  <g transform="translate(335, 48)">
    <rect width="130" height="26" rx="13" class="badge-bg cyan-badge" />
    <text x="65" y="17" text-anchor="middle" class="badge-text">🌐 WEB PENTESTING</text>
  </g>

  <!-- Badge 4: API Auditing -->
  <g transform="translate(480, 48)">
    <rect width="130" height="26" rx="13" class="badge-bg cyan-badge" />
    <text x="65" y="17" text-anchor="middle" class="badge-text">🔌 API PEN-TESTING</text>
  </g>

  <!-- Badge 5: Python -->
  <g transform="translate(625, 48)">
    <rect width="110" height="26" rx="13" class="badge-bg purple-badge" />
    <text x="55" y="17" text-anchor="middle" class="badge-text">🐍 PYTHON SCRIPTING</text>
  </g>

  <!-- Badge 6: Advanced Recon -->
  <g transform="translate(750, 48)">
    <rect width="125" height="26" rx="13" class="badge-bg purple-badge" />
    <text x="62.5" y="17" text-anchor="middle" class="badge-text">🔍 ADVANCED RECON</text>
  </g>

  <!-- Row 2 -->
  <!-- Badge 7: Robotics & IoT -->
  <g transform="translate(100, 83)">
    <rect width="140" height="26" rx="13" class="badge-bg red-badge" />
    <text x="70" y="17" text-anchor="middle" class="badge-text">🤖 ROBOTICS &amp; IOT</text>
  </g>

  <!-- Badge 8: Bash Automation -->
  <g transform="translate(255, 83)">
    <rect width="140" height="26" rx="13" class="badge-bg purple-badge" />
    <text x="70" y="17" text-anchor="middle" class="badge-text">⚙️ BASH AUTOMATION</text>
  </g>

  <!-- Badge 9: JavaScript -->
  <g transform="translate(410, 83)">
    <rect width="120" height="26" rx="13" class="badge-bg purple-badge" />
    <text x="60" y="17" text-anchor="middle" class="badge-text">⚡ JAVASCRIPT</text>
  </g>

  <!-- Badge 10: Burp Suite -->
  <g transform="translate(545, 83)">
    <rect width="115" height="26" rx="13" class="badge-bg cyan-badge" />
    <text x="57.5" y="17" text-anchor="middle" class="badge-text">🎯 BURP SUITE</text>
  </g>

  <!-- Badge 11: Linux & Docker -->
  <g transform="translate(675, 83)">
    <rect width="125" height="26" rx="13" class="badge-bg purple-badge" />
    <text x="62.5" y="17" text-anchor="middle" class="badge-text">🐧 LINUX &amp; DOCKER</text>
  </g>
</svg>
