<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #04050a;
        stroke: #bd00ff;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 8px rgba(189, 0, 255, 0.15));
      }

      .glitch-group {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 15px;
        fill: #ffffff;
        letter-spacing: 3px;
      }
      
      .header-text {
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        font-size: 18px;
        fill: #00f0ff;
        letter-spacing: 5px;
        text-shadow: 0 0 5px #00f0ff;
      }

      .red-alert {
        fill: #ff0055;
        text-shadow: 0 0 5px #ff0055;
      }

      /* Glitch Keyframe Animations */
      .glitch-1 {
        animation: glitch-anim-1 4s infinite steps(2) alternate;
      }

      .glitch-2 {
        animation: glitch-anim-2 3.5s infinite steps(1) alternate-reverse;
      }

      @keyframes glitch-anim-1 {
        0%, 95%, 98%, 100% {
          transform: translate(0, 0) skew(0deg);
          filter: none;
        }
        96% {
          transform: translate(-3px, 2px) skew(-5deg);
          filter: drop-shadow(2px 0 0 #ff0055) drop-shadow(-2px 0 0 #00f0ff);
        }
        97% {
          transform: translate(3px, -2px) skew(5deg);
          filter: drop-shadow(-2px 0 0 #ff0055) drop-shadow(2px 0 0 #00f0ff);
        }
        99% {
          transform: translate(-1px, -1px) skew(-2deg);
        }
      }

      @keyframes glitch-anim-2 {
        0%, 92%, 96%, 100% {
          transform: translate(0, 0);
          opacity: 1;
        }
        93%, 95% {
          transform: translate(4px, -3px);
          opacity: 0.8;
          fill: #ff0055;
        }
        94% {
          transform: translate(-4px, 3px);
          opacity: 0.9;
          fill: #00f0ff;
        }
      }
    </style>
  </defs>

  <!-- Box Container -->
  <rect width="900" height="120" rx="6" class="bg" />

  <!-- Corner Brackets -->
  <path d="M 2 15 L 2 2 L 15 2" fill="none" stroke="#00f0ff" stroke-width="3" />
  <path d="M 898 15 L 898 2 L 883 2" fill="none" stroke="#00f0ff" stroke-width="3" />
  <path d="M 2 105 L 2 118 L 15 118" fill="none" stroke="#bd00ff" stroke-width="3" />
  <path d="M 898 105 L 898 118 L 883 118" fill="none" stroke="#bd00ff" stroke-width="3" />

  <!-- Bio Details with Glitch Effects -->
  <g class="glitch-group" transform="translate(30, 0)">
    <!-- Header -->
    <text x="0" y="38" class="header-text glitch-1">REIHAN VALENTINO YUDISTIRA // CORE_IDENTITY</text>
    
    <!-- Info Line 1 -->
    <text x="0" y="68" class="glitch-2">LOC: BOGOR, INDONESIA // CLASS: EXPERT_SECURITY_AUDITOR</text>
    
    <!-- Info Line 2 -->
    <text x="0" y="94" class="glitch-1">NASA VDP VULNERABILITY DISC: <tspan class="red-alert">RECOGNIZED (LoR)</tspan> // OTN 2024 ROBOTICS: COMPETITOR</text>
  </g>
</svg>
