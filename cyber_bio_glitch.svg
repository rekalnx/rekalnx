<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #030408;
        stroke: #bd00ff;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 8px rgba(189, 0, 255, 0.2));
      }
      
      .scanlines {
        fill: url(#scanlinePattern);
        opacity: 0.12;
      }

      .glitch-group {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 15px;
        fill: #ffffff;
        letter-spacing: 3px;
      }
      
      .header-text {
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        font-size: 18px;
        fill: #00f0ff;
        letter-spacing: 5px;
        animation: glitch-chromatic-1 5s infinite;
      }

      .red-alert {
        fill: #ff0055;
        text-shadow: 0 0 6px #ff0055;
      }
      
      .green-active {
        fill: #00ff66;
        text-shadow: 0 0 6px #00ff66;
        animation: blink 1.2s step-end infinite;
      }

      /* Glitch Chromatic Aberration Animations */
      .glitch-txt {
        animation: glitch-chromatic-2 4.5s infinite;
      }

      @keyframes glitch-chromatic-1 {
        0%, 94%, 96%, 98%, 100% {
          text-shadow: 0 0 5px #00f0ff;
          transform: translate(0, 0) skew(0deg);
        }
        95% {
          text-shadow: 2.5px -1.5px 0 #ff0055, -2.5px 1.5px 0 #00f0ff;
          transform: translate(-2px, 1px) skew(-3deg);
        }
        97% {
          text-shadow: -2.5px 1.5px 0 #ff0055, 2.5px -1.5px 0 #00f0ff;
          transform: translate(2px, -1px) skew(3deg);
        }
      }

      @keyframes glitch-chromatic-2 {
        0%, 91%, 95%, 99%, 100% {
          text-shadow: none;
          transform: translate(0, 0);
        }
        92%, 94% {
          text-shadow: 3px -2px 0 #ff0055, -3px 2px 0 #00f0ff;
          transform: translate(3px, -2px);
          fill: #ffffff;
        }
        93% {
          transform: translate(-3px, 2px);
          fill: #ff0055;
        }
      }

      @keyframes blink {
        from, to { opacity: 0; }
        50% { opacity: 1; }
      }

      .telemetry-line {
        stroke: #1c2340;
        stroke-width: 1;
        stroke-dasharray: 4, 4;
      }
    </style>

    <!-- Scanline Pattern -->
    <pattern id="scanlinePattern" width="100" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100" y2="0" stroke="#000000" stroke-width="1.5" />
    </pattern>
  </defs>

  <!-- Box Container -->
  <rect width="900" height="120" rx="6" class="bg" />
  
  <!-- CRT Scanlines -->
  <rect width="900" height="120" class="scanlines" rx="6" />

  <!-- Corner Brackets -->
  <path d="M 2 15 L 2 2 L 15 2" fill="none" stroke="#00f0ff" stroke-width="3" />
  <path d="M 898 15 L 898 2 L 883 2" fill="none" stroke="#00f0ff" stroke-width="3" />
  <path d="M 2 105 L 2 118 L 15 118" fill="none" stroke="#bd00ff" stroke-width="3" />
  <path d="M 898 105 L 898 118 L 883 118" fill="none" stroke="#bd00ff" stroke-width="3" />

  <!-- Telemetry Lines -->
  <line x1="30" y1="46" x2="870" y2="46" class="telemetry-line" />
  <line x1="30" y1="76" x2="870" y2="76" class="telemetry-line" />

  <!-- Bio Details with Glitch Effects -->
  <g class="glitch-group" transform="translate(30, 0)">
    <!-- Header -->
    <text x="0" y="38" class="header-text">REIHAN VALENTINO YUDISTIRA // CORE_IDENTITY <tspan class="green-active">[ACTIVE]</tspan></text>
    
    <!-- Info Line 1 -->
    <text x="0" y="67" class="glitch-txt">LOC: BOGOR, INDONESIA // CLASS: EXPERT_SECURITY_AUDITOR</text>
    
    <!-- Info Line 2 -->
    <text x="0" y="95" class="glitch-txt">NASA VDP VULNERABILITY DISC: <tspan class="red-alert">RECOGNIZED (LoR)</tspan> // OTN 2024 ROBOTICS: COMPETITOR</text>
  </g>
</svg>
