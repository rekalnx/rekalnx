<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code&amp;family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #030407;
        stroke: #bd00ff;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 8px rgba(189, 0, 255, 0.15));
      }

      .code-line {
        font-family: 'Fira Code', monospace;
        font-size: 11px;
        fill: #8f9bb3;
      }

      .code-highlight {
        fill: #ff0055;
        font-weight: bold;
        text-shadow: 0 0 4px #ff0055;
      }

      .line-num {
        fill: #4c566a;
        font-family: 'Fira Code', monospace;
        font-size: 10px;
        text-anchor: end;
      }

      .keyword {
        fill: #bd00ff;
      }

      .scanner-beam {
        stroke: rgba(189, 0, 255, 0.5);
        stroke-width: 2.5;
        filter: drop-shadow(0 0 5px #bd00ff);
        animation: audit-scan 5s linear infinite;
      }

      @keyframes audit-scan {
        0% { transform: translateY(0); }
        50% { transform: translateY(180px); }
        100% { transform: translateY(0); }
      }

      .vulnerability-alert {
        stroke: #ff0055;
        stroke-width: 1;
        fill: none;
        stroke-dasharray: 4;
        animation: blink-border 1.5s infinite steps(2);
      }

      @keyframes blink-border {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
      }

      .alert-tag {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #ff0055;
        font-weight: bold;
        animation: blink-text 1.5s infinite alternate;
      }

      @keyframes blink-text {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; text-shadow: 0 0 4px #ff0055; }
      }
      
      .telemetry-txt {
        font-family: 'Share Tech Mono', monospace;
        font-size: 12px;
        fill: #00f0ff;
      }

      .check-ok {
        fill: #00ff66;
        font-weight: bold;
      }
      .check-warn {
        fill: #ffaa00;
        font-weight: bold;
      }
    </style>

    <!-- Define the Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff0055" />
    </marker>
  </defs>

  <!-- Box Container -->
  <rect width="900" height="250" rx="6" class="bg" />

  <!-- LEFT SIDE: Solidity Code Area (with Line Numbers) -->
  <g transform="translate(50, 55)">
    <!-- Line numbers -->
    <text x="-15" y="15" class="line-num">1</text>
    <text x="-15" y="35" class="line-num">2</text>
    <text x="-15" y="55" class="line-num">3</text>
    <text x="-15" y="75" class="line-num">4</text>
    <text x="-15" y="95" class="line-num">5</text>
    <text x="-15" y="115" class="line-num">6</text>
    <text x="-15" y="135" class="line-num">7</text>

    <!-- Solidity Code -->
    <text y="15" class="code-line"><tspan class="keyword">contract</tspan> SolidityVault {</text>
    <text y="35" class="code-line">  <tspan class="keyword">mapping</tspan>(address => uint) balances;</text>
    <text y="55" class="code-line">  <tspan class="keyword">function</tspan> withdraw() <tspan class="keyword">public</tspan> {</text>
    <text y="75" class="code-line code-highlight">    msg.sender.call{value: balances[msg.sender]}("");</text>
    <text y="95" class="code-line">    balances[msg.sender] = 0;</text>
    <text y="115" class="code-line">  }</text>
    <text y="135" class="code-line">}</text>

    <!-- Vulnerability indicator box -->
    <rect x="-5" y="62" width="375" height="18" class="vulnerability-alert" />
    <!-- Alert Arrow and Label -->
    <path d="M 375,71 L 395,71" stroke="#ff0055" stroke-width="1.5" marker-end="url(#arrow)" />
    <text x="20" y="165" class="alert-tag">⚠️ CRITICAL: REENTRANCY VULNERABILITY FOUND (CWE-306)</text>
  </g>

  <!-- Divider Line -->
  <line x1="470" y1="35" x2="470" y2="250" stroke="#1b162b" stroke-width="1" />

  <!-- RIGHT SIDE: Diagnostic Telemetry Logs -->
  <g transform="translate(500, 55)">
    <text y="15" class="telemetry-txt">AUDIT_TARGET: SolidityVault.sol</text>
    <text y="35" class="telemetry-txt" style="fill: #8f9bb3;">[+] AST parsed successfully. Running Slither Checkers...</text>
    
    <!-- Checklist items -->
    <text y="55" class="telemetry-txt"><tspan class="check-ok">[OK]</tspan> unchecked-transfer</text>
    <text y="70" class="telemetry-txt"><tspan class="check-ok">[OK]</tspan> shadow-state-variables</text>
    <text y="85" class="telemetry-txt"><tspan class="check-warn">[FAIL]</tspan> reentrancy-eth (SWC-107)</text>
    <text y="100" class="telemetry-txt"><tspan class="check-ok">[OK]</tspan> uninitialized-storage-pointers</text>

    <text y="122" class="telemetry-txt" style="fill: #ff0055; font-weight: bold;">[!] VULNERABILITY LOCATED AT LINE 4</text>
    <text y="137" class="telemetry-txt" style="fill: #00ff66;">[+] REMEDY: Apply CEI pattern or ReentrancyGuard.</text>
    <text y="152" class="telemetry-txt" style="fill: #00ff66;">[+] REMEDY CODE: balances[msg.sender] = 0; before call.</text>
    <text y="167" class="telemetry-txt" style="fill: #00ff66;">[+] STATUS: SECURITY PATCH GENERATED // SECURE</text>
  </g>

  <!-- Scanner Beam -->
  <line x1="10" y1="40" x2="450" y2="40" class="scanner-beam" />

  <!-- Card Header overlay -->
  <rect width="900" height="30" fill="#04050a" opacity="0.85" />
  <text x="25" y="20" font-family="'Share Tech Mono', monospace" font-size="12" fill="#bd00ff" font-weight="bold" letter-spacing="2">SMART_CONTRACT_VULN_SCANNER // AUDIT_ENGINE</text>
  <line x1="0" y1="35" x2="900" y2="35" stroke="#ff0055" stroke-width="1.5" />
</svg>
