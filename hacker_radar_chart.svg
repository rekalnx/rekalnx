<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #030407;
        stroke: #bd00ff;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 6px rgba(189, 0, 255, 0.1));
      }

      .chart-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 9px;
        fill: #8f9bb3;
        font-weight: bold;
      }

      .chart-spoke {
        stroke: #1b162b;
        stroke-width: 1;
      }

      .chart-grid {
        stroke: #1b162b;
        stroke-width: 1;
        fill: none;
      }

      .skill-polygon {
        fill: rgba(0, 240, 255, 0.25);
        stroke: #00f0ff;
        stroke-width: 2;
        filter: drop-shadow(0 0 5px #00f0ff);
        animation: pulse-skill 3s infinite ease-in-out;
      }

      @keyframes pulse-skill {
        0%, 100% { fill: rgba(0, 240, 255, 0.25); stroke: #00f0ff; }
        50% { fill: rgba(189, 0, 255, 0.35); stroke: #bd00ff; filter: drop-shadow(0 0 8px #bd00ff); }
      }

      .skill-node {
        fill: #00f0ff;
        stroke: #ffffff;
        stroke-width: 1;
        animation: blink-node 2s infinite ease-in-out;
      }

      @keyframes blink-node {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; fill: #bd00ff; }
      }
    </style>
  </defs>

  <!-- Box Container -->
  <rect width="440" height="250" rx="5" class="bg" />

  <!-- Radar Grid (Pentagons) -->
  <!-- Level 4 (Outer) -->
  <polygon points="220,60 300,118 269,212 171,212 140,118" class="chart-grid" stroke-dasharray="2, 2" />
  <!-- Level 3 -->
  <polygon points="220,80 280,123 256,194 184,194 160,123" class="chart-grid" />
  <!-- Level 2 -->
  <polygon points="220,100 260,128 243,176 197,176 180,128" class="chart-grid" />
  <!-- Level 1 -->
  <polygon points="220,120 240,134 231,158 209,158 200,134" class="chart-grid" />

  <!-- Spokes -->
  <line x1="220" y1="140" x2="220" y2="60" class="chart-spoke" />
  <line x1="220" y1="140" x2="300" y2="118" class="chart-spoke" />
  <line x1="220" y1="140" x2="269" y2="212" class="chart-spoke" />
  <line x1="220" y1="140" x2="171" y2="212" class="chart-spoke" />
  <line x1="220" y1="140" x2="140" y2="118" class="chart-spoke" />

  <!-- Skill Data Polygon (Locked-on stats) -->
  <!-- Smart Contracts: 95% (220, 64) -->
  <!-- Web Pentesting: 90% (292, 120) -->
  <!-- Recon/OSINT: 92% (265, 206) -->
  <!-- API Audits: 85% (178, 201) -->
  <!-- Robotics/IoT: 80% (156, 122) -->
  <polygon points="220,64 292,120 265,206 178,201 156,122" class="skill-polygon" />

  <!-- Skill Nodes -->
  <circle cx="220" cy="64" r="3.5" class="skill-node" />
  <circle cx="292" cy="120" r="3.5" class="skill-node" />
  <circle cx="265" cy="206" r="3.5" class="skill-node" />
  <circle cx="178" cy="201" r="3.5" class="skill-node" />
  <circle cx="156" cy="122" r="3.5" class="skill-node" />

  <!-- Vertices Labels -->
  <text x="220" y="52" text-anchor="middle" class="chart-label" style="fill: #ff0055;">🛡️ SMART_CONTRACTS (95%)</text>
  <text x="310" y="121" text-anchor="start" class="chart-label">🌐 WEB_PENTEST (90%)</text>
  <text x="279" y="222" text-anchor="start" class="chart-label">🔍 RECON_AUTO (92%)</text>
  <text x="161" y="222" text-anchor="end" class="chart-label">🔌 API_AUDITS (85%)</text>
  <text x="130" y="121" text-anchor="end" class="chart-label">🤖 ROBOTICS_IOT (80%)</text>

  <!-- Card Header overlay -->
  <rect width="440" height="30" fill="#04050a" opacity="0.85" />
  <text x="20" y="20" font-family="'Share Tech Mono', monospace" font-size="11" fill="#bd00ff" font-weight="bold" letter-spacing="1">RADAR_HUD_CAPABILITIES_MAP</text>
  <line x1="0" y1="30" x2="440" y2="30" stroke="#00f0ff" stroke-width="1" />
</svg>
