<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #030407;
        stroke: #bd00ff;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 8px rgba(189, 0, 255, 0.15));
      }

      .chart-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 10px;
        fill: #8f9bb3;
        font-weight: bold;
      }

      .chart-spoke {
        stroke: #1b162b;
        stroke-width: 1;
      }

      .chart-grid {
        stroke: #1b162b;
        stroke-width: 1;
        fill: none;
      }

      .skill-polygon {
        fill: rgba(0, 240, 255, 0.25);
        stroke: #00f0ff;
        stroke-width: 2;
        filter: drop-shadow(0 0 6px #00f0ff);
        animation: pulse-skill 3s infinite ease-in-out;
      }

      @keyframes pulse-skill {
        0%, 100% { fill: rgba(0, 240, 255, 0.25); stroke: #00f0ff; }
        50% { fill: rgba(189, 0, 255, 0.35); stroke: #bd00ff; filter: drop-shadow(0 0 8px #bd00ff); }
      }

      .skill-node {
        fill: #00f0ff;
        stroke: #ffffff;
        stroke-width: 1;
        animation: blink-node 2s infinite ease-in-out;
      }

      @keyframes blink-node {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; fill: #bd00ff; }
      }
      
      .info-title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 12px;
        fill: #00f0ff;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .info-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #8f9bb3;
      }

      .level-bar-bg {
        fill: #12182c;
        stroke: #1b2340;
        stroke-width: 1;
      }
    </style>
  </defs>

  <!-- Box Container -->
  <rect width="900" height="250" rx="6" class="bg" />

  <!-- LEFT SIDE: Capabilities Info & Animated Progress Bars -->
  <g transform="translate(40, 65)">
    <text y="15" class="info-title">🛡️ SECTOR: BLOCKCHAIN &amp; WEB3</text>
    
    <!-- Bar 1: Smart Contracts -->
    <text x="0" y="38" class="info-text">Smart Contract Security</text>
    <rect x="0" y="44" width="180" height="5" rx="2.5" class="level-bar-bg" />
    <rect x="0" y="44" width="171" height="5" rx="2.5" fill="#00f0ff" filter="drop-shadow(0 0 3px #00f0ff)">
      <animate attributeName="width" from="0" to="171" dur="2s" fill="freeze" />
    </rect> <!-- 95% -->

    <!-- Bar 2: API Security -->
    <text x="0" y="70" class="info-text">API Pen-testing</text>
    <rect x="0" y="76" width="180" height="5" rx="2.5" class="level-bar-bg" />
    <rect x="0" y="76" width="153" height="5" rx="2.5" fill="#bd00ff" filter="drop-shadow(0 0 3px #bd00ff)">
      <animate attributeName="width" from="0" to="153" dur="2s" begin="0.3s" fill="freeze" />
    </rect> <!-- 85% -->
    
    <text x="0" y="105" class="info-text">Smart Contract Audits: 33+ completed</text>
    <text x="0" y="122" class="info-text">Key focus: Reentrancy, Access Control</text>
  </g>

  <!-- CENTER: Radar Grid & Rotating HUD Rings (Centered at 450, 140) -->
  <circle cx="450" cy="140" r="100" fill="none" stroke="#bd00ff" stroke-width="0.75" stroke-dasharray="4, 12" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 450 140" to="360 450 140" dur="25s" repeatCount="indefinite" />
  </circle>

  <!-- Level 4 (Outer) -->
  <polygon points="450,60 530,118 499,212 401,212 370,118" class="chart-grid" stroke-dasharray="2, 2" />
  <!-- Level 3 -->
  <polygon points="450,80 510,123 486,194 414,194 390,123" class="chart-grid" />
  <!-- Level 2 -->
  <polygon points="450,100 490,128 473,176 427,176 410,128" class="chart-grid" />
  <!-- Level 1 -->
  <polygon points="450,120 470,134 461,158 439,158 430,134" class="chart-grid" />

  <!-- Spokes -->
  <line x1="450" y1="140" x2="450" y2="60" class="chart-spoke" />
  <line x1="450" y1="140" x2="530" y2="118" class="chart-spoke" />
  <line x1="450" y1="140" x2="499" y2="212" class="chart-spoke" />
  <line x1="450" y1="140" x2="401" y2="212" class="chart-spoke" />
  <line x1="450" y1="140" x2="370" y2="118" class="chart-spoke" />

  <!-- Skill Data Polygon (Locked-on stats) -->
  <polygon points="450,64 522,120 495,206 408,201 386,122" class="skill-polygon" />

  <!-- Skill Nodes -->
  <circle cx="450" cy="64" r="3.5" class="skill-node" />
  <circle cx="522" cy="120" r="3.5" class="skill-node" />
  <circle cx="495" cy="206" r="3.5" class="skill-node" />
  <circle cx="408" cy="201" r="3.5" class="skill-node" />
  <circle cx="386" cy="122" r="3.5" class="skill-node" />

  <!-- Vertices Labels -->
  <text x="450" y="52" text-anchor="middle" class="chart-label" style="fill: #ff0055;">🛡️ SMART_CONTRACTS (95%)</text>
  <text x="542" y="121" text-anchor="start" class="chart-label">🌐 WEB_PENTEST (90%)</text>
  <text x="511" y="222" text-anchor="start" class="chart-label">🔍 RECON_AUTO (92%)</text>
  <text x="389" y="222" text-anchor="end" class="chart-label">🔌 API_AUDITS (85%)</text>
  <text x="358" y="121" text-anchor="end" class="chart-label">🤖 ROBOTICS_IOT (80%)</text>

  <!-- RIGHT SIDE: Capabilities Info & Animated Progress Bars -->
  <g transform="translate(680, 65)">
    <text y="15" class="info-title">💥 SECTOR: OFFENSIVE &amp; RECON</text>
    
    <!-- Bar 3: Web Pentesting -->
    <text x="0" y="38" class="info-text">Web App Pen-testing</text>
    <rect x="0" y="44" width="180" height="5" rx="2.5" class="level-bar-bg" />
    <rect x="0" y="44" width="162" height="5" rx="2.5" fill="#00f0ff" filter="drop-shadow(0 0 3px #00f0ff)">
      <animate attributeName="width" from="0" to="162" dur="2s" begin="0.2s" fill="freeze" />
    </rect> <!-- 90% -->

    <!-- Bar 4: Recon Automation -->
    <text x="0" y="70" class="info-text">Recon Automation</text>
    <rect x="0" y="76" width="180" height="5" rx="2.5" class="level-bar-bg" />
    <rect x="0" y="76" width="165" height="5" rx="2.5" fill="#bd00ff" filter="drop-shadow(0 0 3px #bd00ff)">
      <animate attributeName="width" from="0" to="165" dur="2s" begin="0.5s" fill="freeze" />
    </rect> <!-- 92% -->
    
    <text x="0" y="105" class="info-text">Resolved H1 Reports: 13+</text>
    <text x="0" y="122" class="info-text">Custom recon tooling: Active</text>
  </g>

  <!-- Card Header overlay -->
  <rect width="900" height="30" fill="#04050a" opacity="0.85" />
  <text x="25" y="20" font-family="'Share Tech Mono', monospace" font-size="12" fill="#bd00ff" font-weight="bold" letter-spacing="2">RADAR_HUD_CAPABILITIES_MAP // CHARACTER_LEVEL_SYSTEM</text>
  <line x1="0" y1="35" x2="900" y2="35" stroke="#00f0ff" stroke-width="1.5" />
</svg>
