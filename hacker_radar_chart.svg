<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .bg {
        fill: #030407;
        stroke: #bd00ff;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 8px rgba(189, 0, 255, 0.15));
      }

      .chart-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 10px;
        fill: #8f9bb3;
        font-weight: bold;
      }

      .chart-spoke {
        stroke: #1b162b;
        stroke-width: 1;
      }

      .chart-grid {
        stroke: #1b162b;
        stroke-width: 1;
        fill: none;
      }

      .skill-polygon {
        fill: rgba(0, 240, 255, 0.25);
        stroke: #00f0ff;
        stroke-width: 2;
        filter: drop-shadow(0 0 6px #00f0ff);
        animation: pulse-skill 3s infinite ease-in-out;
      }

      @keyframes pulse-skill {
        0%, 100% { fill: rgba(0, 240, 255, 0.25); stroke: #00f0ff; }
        50% { fill: rgba(189, 0, 255, 0.35); stroke: #bd00ff; filter: drop-shadow(0 0 8px #bd00ff); }
      }

      .skill-node {
        fill: #00f0ff;
        stroke: #ffffff;
        stroke-width: 1;
        animation: blink-node 2s infinite ease-in-out;
      }

      @keyframes blink-node {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; fill: #bd00ff; }
      }
      
      .info-title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 12px;
        fill: #00f0ff;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .info-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #8f9bb3;
      }
    </style>
  </defs>

  <!-- Box Container -->
  <rect width="900" height="250" rx="6" class="bg" />

  <!-- LEFT SIDE: Capabilities Info -->
  <g transform="translate(40, 65)">
    <text y="15" class="info-title">🛡️ SECTOR: BLOCKCHAIN &amp; WEB3</text>
    <text y="35" class="info-text">- Solidity Audit: Expert level</text>
    <text y="55" class="info-text">- Vulnerability mitigation rate: 98%</text>
    <text y="75" class="info-text">- Smart Contract audits completed: 33+</text>
    <text y="95" class="info-text">- Key focus: Reentrancy, Overflow, Access Control</text>
  </g>

  <!-- CENTER: Radar Grid (Pentagons, Centered at 450, 140) -->
  <!-- Level 4 (Outer) -->
  <polygon points="450,60 530,118 499,212 401,212 370,118" class="chart-grid" stroke-dasharray="2, 2" />
  <!-- Level 3 -->
  <polygon points="450,80 510,123 486,194 414,194 390,123" class="chart-grid" />
  <!-- Level 2 -->
  <polygon points="450,100 490,128 473,176 427,176 410,128" class="chart-grid" />
  <!-- Level 1 -->
  <polygon points="450,120 470,134 461,158 439,158 430,134" class="chart-grid" />

  <!-- Spokes -->
  <line x1="450" y1="140" x2="450" y2="60" class="chart-spoke" />
  <line x1="450" y1="140" x2="530" y2="118" class="chart-spoke" />
  <line x1="450" y1="140" x2="499" y2="212" class="chart-spoke" />
  <line x1="450" y1="140" x2="401" y2="212" class="chart-spoke" />
  <line x1="450" y1="140" x2="370" y2="118" class="chart-spoke" />

  <!-- Skill Data Polygon (Locked-on stats) -->
  <polygon points="450,64 522,120 495,206 408,201 386,122" class="skill-polygon" />

  <!-- Skill Nodes -->
  <circle cx="450" cy="64" r="3.5" class="skill-node" />
  <circle cx="522" cy="120" r="3.5" class="skill-node" />
  <circle cx="495" cy="206" r="3.5" class="skill-node" />
  <circle cx="408" cy="201" r="3.5" class="skill-node" />
  <circle cx="386" cy="122" r="3.5" class="skill-node" />

  <!-- Vertices Labels -->
  <text x="450" y="52" text-anchor="middle" class="chart-label" style="fill: #ff0055;">🛡️ SMART_CONTRACTS (95%)</text>
  <text x="540" y="121" text-anchor="start" class="chart-label">🌐 WEB_PENTEST (90%)</text>
  <text x="509" y="222" text-anchor="start" class="chart-label">🔍 RECON_AUTO (92%)</text>
  <text x="391" y="222" text-anchor="end" class="chart-label">🔌 API_AUDITS (85%)</text>
  <text x="360" y="121" text-anchor="end" class="chart-label">🤖 ROBOTICS_IOT (80%)</text>

  <!-- RIGHT SIDE: Capabilities Info -->
  <g transform="translate(640, 65)">
    <text y="15" class="info-title">💥 SECTOR: OFFENSIVE &amp; RECON</text>
    <text y="35" class="info-text">- Web Pentesting: Advanced</text>
    <text y="55" class="info-text">- OSINT &amp; Recon: Automation expert</text>
    <text y="75" class="info-text">- Resolved H1 Reports: 13+</text>
    <text y="95" class="info-text">- Custom recon toolkit: Active</text>
  </g>

  <!-- Card Header overlay -->
  <rect width="900" height="30" fill="#04050a" opacity="0.85" />
  <text x="25" y="20" font-family="'Share Tech Mono', monospace" font-size="12" fill="#bd00ff" font-weight="bold" letter-spacing="2">RADAR_HUD_CAPABILITIES_MAP // CHARACTER_LEVEL_SYSTEM</text>
  <line x1="0" y1="35" x2="900" y2="35" stroke="#00f0ff" stroke-width="1.5" />
</svg>
